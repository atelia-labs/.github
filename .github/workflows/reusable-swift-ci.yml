name: Reusable Swift CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  swift:
    name: Swift
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve package
        run: swift package resolve

      - name: Validate package manifest
        run: swift package dump-package

      - name: Build
        run: swift build -Xswiftc -warnings-as-errors

      - name: Test
        run: swift test -Xswiftc -warnings-as-errors
